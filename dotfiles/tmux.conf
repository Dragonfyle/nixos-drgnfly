set-option -g focus-events on
set-hook -g pane-focus-in 'set-option -w @claude_waiting 0'
set -g default-terminal "screen-256color"
# no delay after escape
set -sg escape-time 0
set -g mode-keys vi
set -g pane-border-style fg='red'
set -g pane-active-border-style fg='blue'


# Overall Status Bar
set -g status-style bg=black,fg='#726E75'

# Right Section
set -g status-right-length 50
set -g  status-right ""
set -ga status-right "#[fg=yellow]#(/home/michal/scripts/tmux-wifi-network.sh)  "
set -ga status-right "#[fg=yellow]%Y-%m-%d %H:%M #[fg=white]"

# Default Window Tabs
set -g window-status-format "#{?@claude_waiting,#[fg=green]#I #W #F|,#[fg=#E9856E]#I #[fg=white]#W #F|}"
set -g window-status-style bg=black,fg=grey
# Active Window Tab
set -g window-status-current-format "#I #W #F|"
set -g window-status-current-style bg=black,fg='#E9856E'


bind r source-file ~/.tmux.conf

unbind C-b
set-option -g prefix C-Space
bind-key C-a send-prefix

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind -n M-H select-pane -L
bind -n M-L select-pane -R
bind -n M-K select-pane -U
bind -n M-J select-pane -D
bind c new-window -a -c "#{pane_current_path}"

unbind C-l
unbind C-h
unbind C-j
unbind C-k
unbind C-S-l
unbind C-S-h
bind -n M-l next-window
bind -n M-h previous-window

# Change copy keybindings in copy-mode-vi
bind -T copy-mode-vi y send -X copy-selection-no-clear

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'schasse/tmux-jump'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
