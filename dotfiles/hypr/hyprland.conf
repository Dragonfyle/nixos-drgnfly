# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor = HDMI-A-1, 2560x1440@144, auto, 1
monitor = eDP-1, 1920x1080@144, auto, 1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
$menu = fuzzel


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

#exec-once = systemd-inhibit --who="Hyprland config" --why="wlogout keybind" --what=handle-power-key --mode=block sleep infinity & echo $! > /tmp/.hyprland-systemd-inhibit
#exec-shutdown = kill -9 "$(cat /tmp/.hyprland-systemd-inhibit)
exec-once = ~/scripts/hyprland-monitor-switch.sh
exec-once = dunst
exec-once = $terminal
exec-once = [workspace 11 silent] vivaldi
exec-once = tmux setenv -g HYPRLAND_INSTANCE_SIGNATURE "$HYPRLAND_INSTANCE_SIGNATURE"

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
#env = LIBVA_DRIVER_NAME,nvidia
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = GBM_BACKEND,nvidia-drm
#env = ELECTRON_OZONE_PLATFORM_HINT,auto
#env = NVD_BACKEND,direct

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

general {
    gaps_in = 0
    gaps_out = 0

    border_size = 1

    col.active_border = rgb(a8035b)
    col.inactive_border = rgb(595959)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle

	snap {
		border_overlap = true
	}
}

decoration {
    rounding = 5

    active_opacity = 1.0
    inactive_opacity = 1.0

	dim_inactive = 1
	dim_strength = 0.25
	dim_special = 0.5

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = true
    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = abrupt, 0.12, 0, 0.23, 1
    # Configs
    # windows
    animation = windowsIn, 0, 3, emphasizedDecel, popin 80%
    animation = windowsOut, 0, 2, emphasizedDecel, popin 90%
    animation = windowsMove, 0, 3, emphasizedDecel, slide
    animation = border, 0, 10, emphasizedDecel
    # layers
    animation = layersIn, 0, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 0, 2.4, menu_accel, popin 94%
    # fade
    animation = fadeLayersIn, 0, 0.5, menu_decel
    animation = fadeLayersOut, 0, 2.7, menu_accel
    # workspaces
    animation = workspaces, 1, 1, abrupt, fade
    ## specialWorkspace
    animation = specialWorkspaceIn, 1, 1, abrupt, fade
    animation = specialWorkspaceOut, 1, 1, abrupt, fade
}

workspace = w[tv1], gapsout:0, gapsin:0, bordersize:0, rounding:false
workspace = f[1], gapsout:0, gapsin:0, bordersize:0, rounding:false

# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
	smart_split = false
}

binds {
	movefocus_cycles_fullscreen = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
	vfr = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:swapcaps
    kb_rules =

    follow_mouse = 0

    sensitivity = 0.4 # -1.0 - 1.0, 0 means no modification.
	accel_profile = "flat"

    touchpad {
        natural_scroll = false
		disable_while_typing = true
		scroll_factor = 0.5
		drag_3fg = true
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod SHIFT, Q, exit
bindo = $mainMod SHIFT, W, killactive
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, P, exec, $menu
#bind = $mainMod SHIFT, SPACE, pseudo, # dwindle
bind = $mainMod, SPACE, fullscreen, 1
bind = $mainMod, U, togglesplit, # dwindle

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, R, submap, resize
submap = resize
binde = , L, resizeactive, 10% 0
binde = , H, resizeactive, -10% 0
binde = , K, resizeactive, 0 -10%
binde = , J, resizeactive, 0 10%
bind = , escape, submap, reset
submap = reset

bind = $mainMod CTRL, L, resizeactive, 10% 0
bind = $mainMod CTRL, H, resizeactive, -10% 0
bind = $mainMod CTRL, K, resizeactive, 0 -10%
bind = $mainMod CTRL, J, resizeactive, 0 10%

bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

bind = $mainMod SHIFT, SPACE, swapsplit

bind = $mainMod, 1, exec, /home/michal/scripts/hyprland_close_special_workspace.sh && hyprctl dispatch workspace 1
bind = $mainMod, 2, exec, /home/michal/scripts/hyprland_close_special_workspace.sh && hyprctl dispatch workspace 2
bind = $mainMod, 3, exec, /home/michal/scripts/hyprland_close_special_workspace.sh && hyprctl dispatch workspace 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, S, exec, /home/michal/scripts/hyprland_close_special_workspace.sh && hyprctl dispatch workspace 11

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, S, movetoworkspace, 11

#bind = $mainMod, S, togglespecialworkspace, browser
#bind = $mainMod SHIFT, S, movetoworkspace, special:browser

bind = $mainMod, D, togglespecialworkspace, discord
bind = $mainMod SHIFT, D, movetoworkspace, special:discord

bind = $mainMod, I, togglespecialworkspace, llm
bind = $mainMod SHIFT, I, movetoworkspace, special:llm

bind = $mainMod, A, togglespecialworkspace, anthropic
bind = $mainMod SHIFT, A, movetoworkspace, special:anthropic

bind = $mainMod, R, togglespecialworkspace, docsrs
bind = $mainMod SHIFT, R, movetoworkspace, special:docsrs

bind = , Print, exec, grim -g "$(slurp -d)" - | tee ~/screenshots/screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy
bind = $mainMod, Print, exec, /home/michal/scripts/record.sh
bind = $mainMod SHIFT, Print, exec, killall -s SIGINT wf-recorder

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/scripts/brightness.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/scripts/brightness.sh down

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86PowerOff, exec, systemctl suspend

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
	name = smart_gaps_single_tiled
	match:float = false
	match:workspace = w[tv1]

	border_size = 0
	rounding = 0
}

windowrule {
	name = smart_gaps_fullscreen
	match:float = false
	match:workspace = f[1]

	border_size = 0
	rounding = 0
}

windowrule {
	name = browser_workspace
	match:class = ^(firefox|vivaldi.*)$

	workspace = 11
}

windowrule {
	name = discord_workspace
	match:class = ^(vesktop)$

	workspace = special:discord
}

windowrule {
	name = docsrs_workspace
	match:title = ^(Docs.rs)$

	workspace = special:docsrs
}

windowrule {
	name = vivaldi_suppress_activate
	match:class = ^(vivaldi.*)$

	suppress_event = activate
}

windowrule {
	name = firefox_styles
	match:workspace = special:browser
	match:class = ^(firefox)$

	fullscreen = on
}

windowrule {
	name = vesktop_styles
	match:class = ^(vesktop)$

	float = on
	size = monitor_w*0.65 monitor_h*0.65
	center = on
}

windowrule {
	name = perplexity_styles
	match:title = ^(perplexity.*)$

	workspace = special:llm
	suppress_event = activate
	float = on
	size = monitor_w*0.65 monitor_h*0.85
	center = on
}

windowrule {
	name = docsrs_styles
	match:title = ^(Docs.rs)$

	float = on
	size = monitor_w*0.80 monitor_h*0.80
	center = on
}

windowrule {
	name = claude_styles
	match:title = ^(Claude)$

	workspace = special:anthropic
	suppress_event = activate
	float = on
	center = on
	size = monitor_w*0.65 monitor_h*0.85
}

windowrule {
	name = suppress_maximize_events
	match:class = .*

	suppress_event = maximize
}

xwayland {
	force_zero_scaling = true
}
